<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人注册</title>

    <!-- favicon图标 -->
    <link rel="stylesheet" href="favicon.ico">
    <!-- 引入初始化样式 -->
    <link rel="stylesheet" href="css/base.css">
    <!-- 注册css -->
    <link rel="stylesheet" href="css/register.css">

</head>

<body>
    <!-- 不用SEO优化 -->
    <div class="w">
        <div class="header">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt=""></a>
            </div>
        </div>
        <div class="register">
            <h3>
                注册新用户
                <div class="login">已有账号，去
                    <a href="#">登录</a>
                </div>
            </h3>
            <div class="reg_form">
                <!-- 用li做表单 -->
                <ul>
                    <li>
                        <label for="">手机号：</label>
                        <input type="text">
                        <span class="error">
                            <i class="error_icon"></i>手机号码格式不正确，请重新输入</span>
                    </li>
                    <li>
                        <label for="">短信验证码：</label>
                        <input type="text">
                        <span class="success">
                            <i class="success_icon"></i>短信验证码输入正确</span>
                    </li>
                    <li>
                        <label for="">登录密码：</label>
                        <input type="text">
                        <span class="error">
                            <i class="error_icon"></i>手机号码格式不正确，请重新输入</span>
                    </li>
                    <li>
                        <label for="">确认密码：</label>
                        <input type="text">
                        <span class="error">
                            <i class="error_icon"></i>手机号码格式不正确，请重新输入</span>
                    </li>
                </ul>
            </div>
        </div>
        <div class="footer"></div>
    </div>
</body>

</html>
